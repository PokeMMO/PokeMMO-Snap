name: pokemmo
title: PokeMMO
base: core24
version: '4.0a-beta1'
summary: PokeMMO Game Client
license: 'Proprietary'
grade: stable
confinement: strict
compression: lzo
description: |
  PokeMMO is an online-only emulator for several popular Nintendo DS & Game Boy Advance games,
  allowing you to play, talk, fight, and trade with other players in realtime across multiple
  platforms.

  This game requires a constant internet connection. Usage of this program requires an account
  with https://pokemmo.com/ and requires you to accept the PokeMMO Terms of Service at login

platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64

assumes:
  - snapd2.55.5

package-repositories:
  - type: apt
    components: [ main ]
    suites: [ stable ]
    key-id: 99A5C88E3C5B1FA8B05A19D332E9750179FCEA62
    url: https://apt.bell-sw.com/

apps:
  pokemmo:
    command: "./launcher"
    extensions: [ gnome ]
    plugs:
      - network
      - opengl
      - home
      - joystick
      - audio-playback
      - removable-media
    environment:
      JAVA_HOME: "$SNAP/runtime"
      PATH: "$JAVA_HOME/bin/:$PATH"
      _JAVA_OPTIONS: '-Dfile.encoding="UTF-8"'
      XDG_DATA_HOME: "$SNAP/usr/share"
      XDG_CONFIG_HOME: "$XDG_DATA_HOME/.config"
      POKEMMO_IS_SNAPPED: '1'
      LIBDECOR_PLUGIN_DIR: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libdecor/plugins-1

parts:
  pokemmo:
    plugin: dump
    source: https://github.com/PokeMMO/PokeMMO-Launcher/releases/download/v4.0a-beta1/native-image.zip
    source-type: zip
    source-checksum: sha256/9620cb24eaec80d643a42df5058e78e73b11c04264d35de2096a79b88a06ef69
    override-build: |
      case "$CRAFT_ARCH_BUILD_FOR" in
        amd64) cp linux/x64/PokeMMO-Updater $CRAFT_PART_INSTALL/launcher ;;
        arm64) cp linux/arm64/PokeMMO-Updater $CRAFT_PART_INSTALL/launcher ;;
      esac
      chmod +x $CRAFT_PART_INSTALL/launcher
      
      # Handle legacy runtime directory
      mkdir -p $CRAFT_PART_INSTALL/runtime
      cp -r /usr/lib/jvm/bellsoft-java21-*/* $CRAFT_PART_INSTALL/runtime/ || true
    stage-packages:
      - bellsoft-java21-runtime
      - libglu1-mesa
      - zenity
      - libdecor-0-0
      - libdecor-0-plugin-1-gtk
    build-packages:
      - bellsoft-java21
      - ca-certificates-java